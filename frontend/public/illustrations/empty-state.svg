<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="80" r="60" fill="#f1f5f9"/>
  <!-- Inbox tray body -->
  <rect x="55" y="60" width="90" height="55" rx="8" fill="#e2e8f0"/>
  <!-- Tray opening -->
  <rect x="55" y="85" width="90" height="30" rx="0 0 8 8" fill="#cbd5e1"/>
  <!-- Paper/document -->
  <rect x="70" y="48" width="60" height="48" rx="5" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Lines on paper -->
  <rect x="78" y="60" width="30" height="3" rx="1.5" fill="#cbd5e1"/>
  <rect x="78" y="68" width="44" height="3" rx="1.5" fill="#e2e8f0"/>
  <rect x="78" y="76" width="36" height="3" rx="1.5" fill="#e2e8f0"/>
  <!-- Small dots decoration -->
  <circle cx="60" cy="45" r="3" fill="#e2e8f0"/>
  <circle cx="140" cy="50" r="4" fill="#e2e8f0"/>
  <circle cx="148" cy="38" r="2.5" fill="#f1f5f9"/>
  <circle cx="52" cy="100" r="3" fill="#e2e8f0"/>
</svg>
