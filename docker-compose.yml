services:
  # ── PostgreSQL ──
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-socialmedia}
      POSTGRES_USER: ${POSTGRES_USER:-socialmedia_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-socialmedia_password}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-socialmedia_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-socialmedia_user}:${POSTGRES_PASSWORD:-socialmedia_password}@db:5432/${POSTGRES_DB:-socialmedia}
      DEBUG: "False"
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_avatars:/app/app/avatar_storage
      - backend_attachments:/app/app/attachment_storage

  # ── Next.js Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  backend_avatars:
    driver: local
  backend_attachments:
    driver: local
