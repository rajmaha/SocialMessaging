services:
  # ── PostgreSQL ──
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: socialmedia
      POSTGRES_USER: socialmedia_user
      POSTGRES_PASSWORD: socialmedia_password
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialmedia_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://socialmedia_user:socialmedia_password@db:5432/socialmedia
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALGORITHM: HS256
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_avatars:/app/app/avatar_storage
      - backend_attachments:/app/app/attachment_storage

  # ── Next.js Frontend ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - default
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`workspace.saraloms.com`)
      - traefik.http.routers.frontend.entrypoints=https
      - traefik.http.routers.frontend.tls=true
      - traefik.http.routers.frontend.tls.certresolver=letsencrypt
      - traefik.http.services.frontend.loadbalancer.server.port=3000
      - traefik.docker.network=coolify

networks:
  coolify:
    external: true

volumes:
  postgres_data:
    driver: local
  backend_avatars:
    driver: local
  backend_attachments:
    driver: local
