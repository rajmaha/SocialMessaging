# ─────────────────────────────────────────────
# Nginx reverse proxy for SocialMedia
#
# Architecture:
#   Browser -> :80 nginx -> frontend :3000  (pages)
#                        -> backend  :8000  (API)
#
# The frontend JS calls the backend directly via
# NEXT_PUBLIC_API_URL, so nginx mostly serves the
# frontend and proxies public backend endpoints
# that external systems hit (webhooks, tracking, etc).
# ─────────────────────────────────────────────

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# ── Main server ──
server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # ── Backend: Swagger docs ──
    location /docs {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /openapi.json {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }
    location /redoc {
        proxy_pass http://backend;
        proxy_set_header Host $host;
    }

    # ── Backend: public endpoints (no auth) ──
    # Tracking pixels, click tracking, unsubscribe, webhooks, webchat WS
    location ~ ^/(campaigns/track|campaigns/unsubscribe|campaigns/resubscribe|webhooks|webchat|kb/public) {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (webchat)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;

        # Disable buffering for SSE
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Backend: all API routes ──
    # Frontend calls API_URL directly, but when running
    # behind a single domain we proxy /api/* -> backend
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;

        # WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Frontend: everything else ──
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
